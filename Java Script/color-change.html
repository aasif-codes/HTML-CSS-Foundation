<style>
div {
    background-color:rgb(0, 245, 61); border-radius:100%; width:300px; height:250px; border:1px ridge black;
}
button {margin-left:30px; padding:6px;}
</style>

<div> </div> <br>
<button onclick="colorChange()">Change</button>


<script>
let ball=document.getElementsByTagName("div")[0]
function colorChange()
{
    ball.style.backgroundColor="blueviolet"
    ball.style.transition="1.5s"
    ball.style.borderRadius="0%"
    ball.style.width="50%"

}

</script>
